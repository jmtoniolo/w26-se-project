<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}iOS Dashboard{% endblock %}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {font-family: Arial, Helvetica, sans-serif;}

            /* The Modal (background) */
            .modal {
                display: none; /* Hidden by default */
                position: fixed; /* Stay in place */
                z-index: 1; /* Sit on top */
                padding-top: 100px; /* Location of the box */
                left: 0;
                top: 0;
                width: 100%; /* Full width */
                height: 100%; /* Full height */
                overflow: auto; /* Enable scroll if needed */
                background-color: rgb(0,0,0); /* Fallback color */
                background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
            }

            /* Modal Content */
            .modal-content {
                position: relative;
                background-color: #fefefe;
                margin: auto;
                padding: 0;
                border: 1px solid #888;
                width: 480px;
                max-width: 90%;
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2),0 6px 20px 0 rgba(0,0,0,0.19);
                -webkit-animation-name: animatetop;
                -webkit-animation-duration: 0.4s;
                animation-name: animatetop;
                animation-duration: 0.4s
            }

            /* Add Animation */
            @-webkit-keyframes animatetop {
                from {top:-300px; opacity:0} 
                to {top:0; opacity:1}
            }

            @keyframes animatetop {
                from {top:-300px; opacity:0}
                to {top:0; opacity:1}
            }

            /* The Close Button */
            .close {
                color: white;
                float: right;
                font-size: 28px;
                font-weight: bold;
            }

            .close:hover,
            .close:focus {
                color: #000;
                text-decoration: none;
                cursor: pointer;
            }

            .modal-header {
                padding: 12px 16px;
                background-color: #2563eb;
                color: white;
            }

            .modal-body {padding: 16px 16px 24px;}

            .list-container {
                width: 100%;
                max-width: 700px;
                padding: 0;
                margin: 0 auto;
                list-style-type: none;
            }

            .list-row {
                display: flex;
                justify-content: space-between;
                padding: 12px 16px;
                border-bottom: 1px solid #e5e7eb;
                width: 100%;
                box-sizing: border-box;
                transition: background-color 0.15s;
            }

            .list-row:not(.list-header):hover {
                background-color: #eff6ff;
            }

            .list-row:not(.list-header):nth-child(even) {
                background-color: #f9fafb;
            }

            .list-row:not(.list-header):nth-child(even):hover {
                background-color: #eff6ff;
            }

            .list-header {
                font-weight: 600;
                background-color: #1e40af;
                color: white;
                border-bottom: none;
                border-radius: 6px 6px 0 0;
            }

            .col-name { flex: 2; text-align: left; }
            .col-qty  { flex: 1; text-align: center; }
            .col-id   { flex: 1; text-align: right; }
        </style>
    </head>
    <body class="bg-gray-50">

        {% include "inventorysplash/components/header.html" %}

        <script src="js/modal.js"></script>

        <main class="p-8">
            {% include "inventorysplash/components/items_list.html" %}
        </main>

        <script src="js/filters.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
